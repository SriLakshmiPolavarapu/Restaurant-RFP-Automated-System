<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathway RFP Pipeline</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111111;
      line-height: 1.5;
    }
  
    .app {
      max-width: 1120px;
      margin: 0 auto;
      padding: 48px 32px 72px;
    }
  
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
      padding-bottom: 20px;
      border-bottom: 1px solid #d9d9d9;
    }
  
    .logo {
      width: 36px;
      height: 36px;
      background: #111111;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
    }
  
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111111;
      letter-spacing: -0.02em;
    }
  
    .header h1 span {
      color: #111111;
      font-weight: 500;
    }
  
    .pipeline {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
  
    .pip-step {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid #cfcfcf;
      background: #ffffff;
      color: #111111;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      min-height: 46px;
    }
  
    .pip-step.active {
      background: #111111;
      color: #ffffff;
      border-color: #111111;
    }
  
    .pip-step.done {
      background: #f5f5f5;
      color: #111111;
      border-color: #d8d8d8;
    }
  
    .pip-num {
      width: 22px;
      height: 22px;
      border: 1px solid currentColor;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
  
    .pip-arrow {
      color: #8a8a8a;
      font-size: 14px;
      display: flex;
      align-items: center;
    }
  
    .card {
      background: #ffffff;
      border: 1px solid #d9d9d9;
      margin-bottom: 24px;
      overflow: hidden;
    }
  
    .card-hd {
      padding: 18px 22px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
  
    .card-hd h2 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #111111;
    }
  
    .card-bd {
      padding: 22px;
    }
  
    .fg {
      margin-bottom: 18px;
    }
  
    .fl {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #111111;
      margin-bottom: 8px;
    }
  
    .fi, .fta {
      width: 100%;
      background: #ffffff;
      border: 1px solid #cfcfcf;
      padding: 12px 14px;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      outline: none;
    }
  
    .fi:focus, .fta:focus {
      border-color: #111111;
    }
  
    .fta {
      resize: vertical;
      min-height: 170px;
      line-height: 1.6;
    }
  
    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
  
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #111111;
      padding: 11px 18px;
      background: #ffffff;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      min-height: 42px;
    }
  
    .btn-accent {
      background: #111111;
      color: #ffffff;
    }
  
    .btn-accent:hover:not(:disabled) {
      background: #000000;
    }
  
    .btn-accent:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  
    .btn-outline {
      background: #ffffff;
      color: #111111;
      border-color: #cfcfcf;
    }
  
    .btn-outline:hover {
      border-color: #111111;
    }
  
    .btn-sm {
      padding: 8px 12px;
      font-size: 12px;
      min-height: 34px;
    }
  
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
  
    @keyframes spin { to { transform: rotate(360deg); } }
  
    .stats {
      display: flex;
      gap: 28px;
      padding: 18px 22px;
      background: #fafafa;
      border: 1px solid #e3e3e3;
      margin-bottom: 20px;
    }
  
    .stat-v {
      font-size: 24px;
      font-weight: 700;
      color: #111111;
    }
  
    .stat-l {
      font-size: 11px;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
  
    .tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
  
    .tbl th {
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 10px 12px;
      border-bottom: 1px solid #dcdcdc;
    }
  
    .tbl td {
      padding: 10px 12px;
      border-bottom: 1px solid #eeeeee;
      vertical-align: top;
    }
  
    .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 4px 8px;
      border: 1px solid #cfcfcf;
      background: #ffffff;
      color: #111111;
    }
  
    .tag-orange, .tag-green, .tag-blue {
      color: #111111;
      background: #ffffff;
      border-color: #cfcfcf;
    }
  
    .dishes {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(320px,1fr));
      gap: 18px;
    }
  
    .dish {
      background: #ffffff;
      border: 1px solid #dddddd;
      padding: 18px;
    }
  
    .dish-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
  
    .dish-name {
      font-size: 16px;
      font-weight: 700;
      color: #111111;
    }
  
    .dish-price {
      font-size: 13px;
      color: #111111;
    }
  
    .dish-desc {
      font-size: 13px;
      color: #444444;
      margin-bottom: 12px;
      line-height: 1.6;
    }
  
    .dish-prep {
      font-size: 12px;
      color: #444444;
      font-style: italic;
      margin-bottom: 10px;
      padding-left: 10px;
      border-left: 2px solid #d0d0d0;
    }
  
    .email-card {
      background: #ffffff;
      border: 1px solid #dddddd;
      padding: 16px;
      margin-bottom: 12px;
    }
  
    .email-to {
      font-size: 12px;
      color: #444444;
      word-break: break-word;
    }
  
    .email-subj {
      font-size: 14px;
      font-weight: 600;
      margin: 6px 0;
      color: #111111;
    }
  
    .email-meta {
      font-size: 12px;
      color: #555555;
    }
  
    .email-status {
      font-size: 12px;
      color: #111111;
    }
  
    .email-status.sent,
    .email-status.mock,
    .email-status.failed {
      color: #111111;
    }
  
    .dist-card {
      background: #ffffff;
      border: 1px solid #dddddd;
      padding: 14px;
      margin-bottom: 10px;
    }
  
    .dist-name {
      font-size: 14px;
      font-weight: 700;
      color: #111111;
    }
  
    .dist-meta {
      font-size: 12px;
      color: #555555;
      margin-top: 4px;
    }
  
    .dist-score {
      font-size: 12px;
      color: #111111;
    }
  
    .err {
      background: #ffffff;
      border: 1px solid #d0d0d0;
      padding: 12px 14px;
      color: #111111;
      font-size: 13px;
      margin-top: 14px;
    }
  
    .hint {
      font-size: 12px;
      color: #555555;
      margin-top: 8px;
    }
  
    .hint a {
      color: #111111;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
  
    .email-preview {
      background: #ffffff;
      padding: 6px;
      margin-top: 12px;
      max-height: 420px;
      overflow-y: auto;
      border: 1px solid #dddddd;
    }
  
    .email-preview iframe {
      width: 100%;
      height: 360px;
      border: none;
      background: #ffffff;
    }
  
    .toggle {
      font-size: 11px;
      color: #111111;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
  
    .fade-up {
      animation: none;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const API = "http://127.0.0.1:8000";

const SAMPLE_MENU = `SALADS
Sesame Seared Ahi Tuna Salad - with field greens, cucumber, carrots, tomatoes & crispy onion rings in miso-wasabi dressing - 13.5
Bleu Chicken Salad - mesclun greens, apple, grilled chicken, gorgonzola cheese, balsamic vinaigrette - 12

SANDWICHES
Reuben - corned beef, melted Swiss, sauerkraut & thousand island on marbled rye - 13
Tuna Melt - local tuna on sourdough toast, topped with melted cheddar, served open-faced - 13
BLT - bacon, lettuce, tomato, avocado with chipotle mayo on toasted multi-grain bread - 11

SMALL PLATES
Roasted Oysters - oven-roasted with garlic butter, parsley, chives, chervil & tarragon - 11
Eggplant Gratinadas - eggplant baked with cheese, fresh Roma tomatoes & goat cheese - 9`;

// ── API helpers ──
async function api(path, opts = {}) {
  const res = await fetch(API + path, { headers: { "Content-Type": "application/json" }, ...opts });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.detail || `HTTP ${res.status}`);
  }
  return res.json();
}
const post = (path, body) => api(path, { method: "POST", body: body ? JSON.stringify(body) : undefined });
const get = (path) => api(path);

// ── Pipeline Steps Bar ──
function Pipeline({ step, setStep, done }) {
  const steps = [
    { n: 1, l: "Menu Recipes" },
    { n: 2, l: "USDA Pricing" },
    { n: 3, l: "Find Distributors" },
    { n: 4, l: "Send RFP Emails" },
  ];

  return (
    <div className="pipeline">
      {steps.map((s, i) => (
        <React.Fragment key={s.n}>
          {i > 0 && <span className="pip-arrow">→</span>}
          <div
            className={`pip-step ${s.n === step ? "active" : done.has(s.n) ? "done" : ""}`}
            onClick={() => (done.has(s.n) || s.n === step) && setStep(s.n)}
          >
            <div className="pip-num">{done.has(s.n) ? "✓" : s.n}</div>
            {s.l}
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

// ── Step 1: Menu Parsing ──
function Step1({ menuId, setMenuId, menuData, setMenuData, markDone }) {
  const [name, setName] = useState("Trattoria Bella");
  const [url, setUrl] = useState("");
  const [text, setText] = useState("");
  const [img, setImg] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState("text");

  const parseText = async () => {
    setLoading(true);
    setError(null);
    try {
      const data = await post("/step1/parse-menu", {
        restaurant_name: name,
        menu_text: text,
        menu_url: url || undefined
      });
      setMenuData(data);
      setMenuId(data.id);
      markDone(1);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const parseImage = async () => {
    if (!img) return;
    setLoading(true);
    setError(null);
    try {
      const fd = new FormData();
      fd.append("image", img);
      if (name) fd.append("restaurant_name", name);
      const res = await fetch(API + "/step1/parse-menu-image", { method: "POST", body: fd });
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.detail || `HTTP ${res.status}`);
      }
      const data = await res.json();
      setMenuData(data);
      setMenuId(data.id);
      markDone(1);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="fade-up">
      <div className="card">
        <div className="card-hd">
          <h2>Step 1 — Menu Input</h2>
          <div style={{ display: "flex", gap: 6 }}>
            <button className={`btn btn-sm ${mode === "text" ? "btn-accent" : "btn-outline"}`} onClick={() => setMode("text")}>Text</button>
            <button className={`btn btn-sm ${mode === "image" ? "btn-accent" : "btn-outline"}`} onClick={() => setMode("image")}>Image</button>
          </div>
        </div>
        <div className="card-bd">
          <div className="fg">
            <label className="fl">Restaurant Name</label>
            <input className="fi" value={name} onChange={e => setName(e.target.value)} placeholder="e.g., Joe's Italian Kitchen" />
          </div>

          {mode === "text" ? (
            <div className="fg">
              <label className="fl">Menu Text</label>
              <textarea className="fta" value={text} onChange={e => setText(e.target.value)} placeholder="Paste the full menu here..." />
              <div className="hint">No menu? <a onClick={() => { setText(SAMPLE_MENU); setName("Coastal Bistro"); }}>Load sample menu</a></div>
            </div>
          ) : (
            <div className="fg">
              <label className="fl">Upload Menu Image</label>
              <input type="file" accept="image/*" onChange={e => setImg(e.target.files[0])} style={{ fontSize: 13, color: "#555" }} />
            </div>
          )}

          <button className="btn btn-accent" disabled={loading || (mode === "text" ? !text.trim() : !img)} onClick={mode === "text" ? parseText : parseImage}>
            {loading ? <><div className="spinner"></div> Parsing with Gemini...</> : <>Parse Menu → Recipes</>}
          </button>
          {error && <div className="err">{error}</div>}
        </div>
      </div>

      {menuData && (
        <>
          <div className="stats fade-up">
            <div><div className="stat-v">{menuData.recipes?.length || 0}</div><div className="stat-l">Dishes</div></div>
            <div><div className="stat-v">{[...new Set(menuData.recipes?.flatMap(r => r.ingredients?.map(i => i.ingredient_name)) || [])].length}</div><div className="stat-l">Unique Ingredients</div></div>
            <div><div className="stat-v">{menuData.id}</div><div className="stat-l">Menu ID</div></div>
          </div>
          <div className="card fade-up">
            <div className="card-hd"><h2>Parsed Dishes & Ingredients</h2></div>
            <div className="card-bd">
              <div className="dishes">
                {menuData.recipes?.map(r => <DishCard key={r.id} dish={r} />)}
              </div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

function DishCard({ dish }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="dish">
      <div className="dish-top">
        <div className="dish-name">{dish.dish_name}</div>
      </div>
      {dish.description && <div className="dish-desc">{dish.description}</div>}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <span className="tag tag-orange">{dish.ingredients?.length || 0} ingredients</span>
        <span className="toggle" onClick={() => setOpen(!open)}>{open ? "hide" : "show"}</span>
      </div>
      {open && dish.ingredients && (
        <table className="tbl">
          <thead><tr><th>Ingredient</th><th>Qty</th><th>Notes</th></tr></thead>
          <tbody>
            {dish.ingredients.map((ing, i) => (
              <tr key={i}>
                <td style={{ fontWeight: 500 }}>{ing.ingredient_name}</td>
                <td>{ing.quantity ? `${ing.quantity} ${ing.unit || ""}` : "—"}</td>
                <td style={{ color: "#666", fontStyle: "italic", fontSize: 11 }}>{ing.preparation_notes || ""}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>
  );
}

// ── Step 2: Pricing ──
function Step2({ menuId, markDone }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const fetchPricing = async () => {
    setLoading(true);
    setError(null);
    try {
      const d = await post(`/step2/fetch-pricing/${menuId}`);
      setData(d);
      markDone(2);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="fade-up">
      <div className="card">
        <div className="card-hd"><h2>Step 2 — USDA Ingredient Pricing</h2></div>
        <div className="card-bd">
          <p style={{ fontSize: 13, color: "#666", marginBottom: 14 }}>Fetch pricing data from the USDA MARS API for all ingredients in menu #{menuId}.</p>
          <button className="btn btn-accent" onClick={fetchPricing} disabled={loading}>
            {loading ? <><div className="spinner"></div> Fetching pricing...</> : <>Fetch Pricing Data</>}
          </button>
          {error && <div className="err">{error}</div>}
        </div>
      </div>

      {data && (
        <>
          <div className="stats fade-up">
            <div><div className="stat-v">{data.ingredient_count}</div><div className="stat-l">Ingredients</div></div>
            <div><div className="stat-v">{data.total_snapshots_stored}</div><div className="stat-l">Price Snapshots</div></div>
          </div>
          <div className="card fade-up">
            <div className="card-hd"><h2>Pricing Results</h2></div>
            <div className="card-bd">
              <table className="tbl">
                <thead><tr><th>Ingredient</th><th>USDA Commodity</th><th>Snapshots</th><th>Status</th></tr></thead>
                <tbody>
                  {data.results?.map((r, i) => (
                    <tr key={i}>
                      <td style={{ fontWeight: 500 }}>{r.ingredient_name}</td>
                      <td style={{ fontSize: 11 }}>{r.commodity_name}</td>
                      <td>{r.snapshots_found}</td>
                      <td>{r.snapshots_found > 0 ? <span className="tag tag-green">found</span> : <span className="tag">no data</span>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ── Step 3: Distributors ──
function Step3({ menuId, markDone }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const findDist = async () => {
    setLoading(true);
    setError(null);
    try {
      const d = await post(`/step3/find-distributors/${menuId}`);
      setData(d);
      markDone(3);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="fade-up">
      <div className="card">
        <div className="card-hd"><h2>Step 3 — Find Local Distributors</h2></div>
        <div className="card-bd">
          <p style={{ fontSize: 13, color: "#666", marginBottom: 14 }}>Search for food distributors near the restaurant and match them to ingredients.</p>
          <button className="btn btn-accent" onClick={findDist} disabled={loading}>
            {loading ? <><div className="spinner"></div> Searching OSM + matching...</> : <>Find Distributors</>}
          </button>
          {error && <div className="err">{error}</div>}
        </div>
      </div>

      {data && (
        <>
          <div className="stats fade-up">
            <div><div className="stat-v">{data.distributor_count}</div><div className="stat-l">Distributors Found</div></div>
            <div><div className="stat-v">{data.match_count}</div><div className="stat-l">Matches</div></div>
            <div><div className="stat-v">{data.city}, {data.state}</div><div className="stat-l">Location</div></div>
          </div>
          <div className="card fade-up">
            <div className="card-hd"><h2>Ingredient ↔ Distributor Matches</h2></div>
            <div className="card-bd">
              <table className="tbl">
                <thead><tr><th>Ingredient</th><th>Distributor</th><th>Category</th><th>Confidence</th></tr></thead>
                <tbody>
                  {data.matches?.map((m, i) => (
                    <tr key={i}>
                      <td style={{ fontWeight: 500 }}>{m.ingredient_name}</td>
                      <td>{m.distributor_name}</td>
                      <td><span className="tag tag-blue">{m.matched_category || "—"}</span></td>
                      <td>{m.confidence_score ? `${(m.confidence_score * 100).toFixed(0)}%` : "—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ── Step 4: RFP Emails ──
function Step4({ menuId, markDone }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [preview, setPreview] = useState(null);

  const sendEmails = async () => {
    setLoading(true);
    setError(null);
    try {
      const d = await post(`/step4/send-rfp-emails/${menuId}`);
      setData(d);
      markDone(4);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const loadPreview = async (emailId) => {
    if (preview?.id === emailId) {
      setPreview(null);
      return;
    }
    try {
      const d = await get(`/step4/rfp-email-detail/${emailId}`);
      setPreview(d);
    } catch (e) {
      console.error(e);
    }
  };

  return (
    <div className="fade-up">
      <div className="card">
        <div className="card-hd"><h2>Step 4 — Send RFP Emails</h2></div>
        <div className="card-bd">
          <p style={{ fontSize: 13, color: "#666", marginBottom: 14 }}>Compose and send RFP emails requesting price quotes from distributors.</p>
          <button className="btn btn-accent" onClick={sendEmails} disabled={loading}>
            {loading ? <><div className="spinner"></div> Sending emails...</> : <>Send RFP Emails</>}
          </button>
          {error && <div className="err">{error}</div>}
        </div>
      </div>

      {data && (
        <>
          <div className="stats fade-up">
            <div><div className="stat-v">{data.emails_sent}</div><div className="stat-l">Emails Sent</div></div>
            <div><div className="stat-v">{data.mock_mode ? "Mock" : "Live"}</div><div className="stat-l">Mode</div></div>
            <div><div className="stat-v" style={{ fontSize: 16 }}>{data.quote_deadline}</div><div className="stat-l">Deadline</div></div>
          </div>
          <div className="card fade-up">
            <div className="card-hd"><h2>Sent Emails</h2></div>
            <div className="card-bd">
              {data.results?.map((r, i) => (
                <div className="email-card" key={i}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{r.distributor_name}</div>
                      <div className="email-to">{r.to_email}</div>
                      <div className="email-subj">{r.subject}</div>
                      <div className="email-meta">{r.ingredient_count} ingredients · Deadline: {r.deadline}</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div className={`email-status ${r.status === "sent" ? "sent" : r.status === "sent_mock" ? "mock" : "failed"}`}>
                        {r.status === "sent" ? "✓ Sent" : r.status === "sent_mock" ? "⚠ Mock" : "✗ Failed"}
                      </div>
                      <span className="toggle" style={{ marginTop: 4, display: "inline-block" }} onClick={() => loadPreview(r.id)}>
                        {preview?.id === r.id ? "hide preview" : "preview email"}
                      </span>
                    </div>
                  </div>
                  {preview && preview.id === r.id && (
                    <div className="email-preview fade-up">
                      <iframe srcDoc={preview.body_html} title="Email Preview" />
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ── App ──
function App() {
  const [step, setStep] = useState(1);
  const [done, setDone] = useState(new Set());
  const [menuId, setMenuId] = useState(null);
  const [menuData, setMenuData] = useState(null);

  const markDone = (n) => {
    setDone(prev => {
      const s = new Set(prev);
      s.add(n);
      return s;
    });
    if (n < 4) setStep(n + 1);
  };

  return (
    <div className="app">
      <div className="header">
        <div className="logo">P</div>
        <h1>Pathway <span>RFP Pipeline</span></h1>
      </div>

      <Pipeline step={step} setStep={setStep} done={done} />

      {step === 1 && <Step1 menuId={menuId} setMenuId={setMenuId} menuData={menuData} setMenuData={setMenuData} markDone={markDone} />}
      {step === 2 && menuId && <Step2 menuId={menuId} markDone={markDone} />}
      {step === 3 && menuId && <Step3 menuId={menuId} markDone={markDone} />}
      {step === 4 && menuId && <Step4 menuId={menuId} markDone={markDone} />}

      {step > 1 && !menuId && (
        <div className="card fade-up">
          <div className="card-bd">
            <p style={{ color: "#666", fontSize: 13 }}>Please complete Step 1 first to parse a menu.</p>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
